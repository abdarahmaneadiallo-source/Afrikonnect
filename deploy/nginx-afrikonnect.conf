# ===== AFRIKONNECT — CONFIG NGINX =====
# Copier dans /etc/nginx/sites-available/afrikonnect
# Activer : sudo ln -s /etc/nginx/sites-available/afrikonnect /etc/nginx/sites-enabled/
# Tester  : sudo nginx -t && sudo systemctl reload nginx
# (Certbot ajoutera automatiquement les blocs SSL après `sudo certbot --nginx`)

# --- Frontend Next.js (port 3000) ---
server {
    listen 80;
    server_name afrikonnect.fr www.afrikonnect.fr;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Fichiers statiques Next.js — cache long
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# --- API Express (port 3001) ---
server {
    listen 80;
    server_name api.afrikonnect.fr;

    # Limite anti-abus basique
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook Stripe — pas de buffering
    location /api/stripe/webhook {
        proxy_pass http://127.0.0.1:3001;
        proxy_buffering off;
        proxy_set_header Host $host;
    }
}
